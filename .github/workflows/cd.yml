name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  release-windows:
    name: Release Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      # Build only the executable, skip installer bundles.
      - name: Build Tauri executable
        run: npm run tauri build -- --no-bundle

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $releaseDir = "src-tauri/target/release"
          $bundleDir = "$releaseDir/bundle/nsis"

          # Direct-download executable.
          $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $exe) {
            throw "No executable found in $releaseDir"
          }
          $exeName = "SpecReader AI v$version.exe"
          Copy-Item -Path $exe.FullName -Destination $exeName -Force

          # Write the private key to a file and use the path env var.
          # This avoids issues with trailing newlines or shell mangling of
          # TAURI_SIGNING_PRIVATE_KEY when passed as a string.
          $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY.Trim()
          $keyPath = Join-Path $env:RUNNER_TEMP "specreader.key"
          $keyContent | Out-File -FilePath $keyPath -NoNewline
          $env:TAURI_SIGNING_PRIVATE_KEY_PATH = $keyPath
          Remove-Item Env:TAURI_SIGNING_PRIVATE_KEY

          # Build the NSIS installer bundle. With createUpdaterArtifacts enabled,
          # Tauri also generates the *.sig signature file for the updater.
          npm run tauri bundle

          # Locate the generated NSIS installer.
          $nsis = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $nsis) {
            throw "No NSIS installer found in $bundleDir"
          }
          $nsisName = "SpecReader-AI_${version}_x64-setup.exe"
          Copy-Item -Path $nsis.FullName -Destination $nsisName -Force

          # Read the auto-generated signature.
          $sigFile = "$($nsis.FullName).sig"
          if (-not (Test-Path $sigFile)) {
            throw "Signature file not found: $sigFile"
          }
          $signature = (Get-Content -Path $sigFile -Raw).Trim()

          # Build the Tauri v2 static updater manifest.
          $manifest = @{
            version = $version
            notes = "SpecReader AI v$version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/photonee/specreader-ai/releases/download/$tag/$nsisName"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path "latest.json" -Encoding UTF8

          "EXE_PATH=$exeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "INSTALLER_PATH=$nsisName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.assets.outputs.EXE_PATH }}
            ${{ steps.assets.outputs.INSTALLER_PATH }}
            latest.json
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
