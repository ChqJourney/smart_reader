name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  release-windows:
    name: Release Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      # Build only the executable, skip installer bundles.
      - name: Build Tauri executable
        run: npm run tauri build -- --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $releaseDir = "src-tauri/target/release"
          $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $exe) {
            throw "No executable found in $releaseDir"
          }

          # Human-readable executable for direct download.
          $exeName = "SpecReader AI v$version.exe"
          Copy-Item -Path $exe.FullName -Destination $exeName -Force

          # Updater expects a .zip archive containing the executable.
          $zipName = "SpecReader-AI_${version}_x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName -Force

          "EXE_PATH=$exeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ZIP_PATH=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Generate the updater manifest (latest.json) signed with the private key.
      - name: Generate updater JSON
        shell: pwsh
        run: |
          cargo tauri updater --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.assets.outputs.EXE_PATH }}
            ${{ steps.assets.outputs.ZIP_PATH }}
            latest.json
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
