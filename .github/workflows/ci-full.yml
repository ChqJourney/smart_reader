# 完整集成检查：master 分支的 push 与 PR。
# 重活集中在这里：生产构建、Rust 测试 / clippy / audit、双浏览器 E2E、npm audit。
# 三个 job 并行执行，墙钟时间取最长者；Rust 依赖有缓存。

name: CI Full

on:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "landing/**"
      - "**.md"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "landing/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build frontend production bundle
        run: npm run build

      - name: Run frontend unit / integration tests
        run: npm run test

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Rust backend tests
        working-directory: ./src-tauri
        run: cargo test

      - name: Run Rust clippy
        working-directory: ./src-tauri
        run: cargo clippy --all -- -D warnings

      # 预编译二进制安装，避免 cargo install 每次源码编译 5~10 分钟
      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        working-directory: ./src-tauri
        run: cargo audit

  e2e:
    name: E2E (chromium + webkit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      # E2E 跑在 Vite dev server 上（Tauri API 已 mock），无需 Rust 工具链
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
