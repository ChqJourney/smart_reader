# 一键发布：GitHub Actions 页面手动触发（Run workflow），输入版本号即可。
#
# 流程：快速门禁 → bump 版本号 + 固化 CHANGELOG + 打 tag → Windows 构建 → Draft Release。
# Draft Release 创建后需人工下载冒烟测试，确认无误后在 Release 页面点 Publish；
# 发布后 latest.json 生效，客户端自动更新才会收到新版本。
#
# 发布前唯一要做的：把本次变更记录到 CHANGELOG.md 的 ## [Unreleased] 段落下
# （为空则 prepare 阶段直接失败，不会打 tag）。

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（x.y.z，不含 v 前缀），如 0.8.2"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  gate:
    name: 发布门禁（快速检查）
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run frontend unit / integration tests
        run: npm run test

  prepare:
    name: 版本固化与打 tag
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 10
    outputs:
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version input and remote tag
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_NAME" != "master" ]; then
            echo "Release 只能从 master 分支触发（当前：$REF_NAME）"
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "版本号格式错误：'$VERSION'，应为 x.y.z（如 0.8.2）"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
            echo "tag v$VERSION 已存在，请换一个版本号"
            exit 1
          fi

      - name: Bump version and freeze CHANGELOG
        id: prepare
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          node scripts/bump-version.mjs "$VERSION"
          node scripts/prepare-release.mjs "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit, tag and push
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json CHANGELOG.md
          git commit -m "release: v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:master
          git push origin "refs/tags/v$VERSION"

  build-windows:
    name: Windows 构建 + Draft Release
    runs-on: windows-latest
    needs: prepare
    timeout-minutes: 60
    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # GitHub Secrets 可能带尾部换行，会破坏 Tauri 更新包签名的 base64 解码，先 trim。
      - name: Normalize updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          "TAURI_SIGNING_PRIVATE_KEY=$($env:TAURI_SIGNING_PRIVATE_KEY.Trim())" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Release notes 取自打 tag 时固化的 CHANGELOG 版本段落
      - name: Extract release notes from CHANGELOG
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ && flag { exit }
            flag
          ' CHANGELOG.md > release_notes.md
          echo "RELEASE_BODY<<__RELEASE_NOTES_EOF__" >> "$GITHUB_ENV"
          cat release_notes.md >> "$GITHUB_ENV"
          echo "__RELEASE_NOTES_EOF__" >> "$GITHUB_ENV"

      # tauri-action 自动构建 NSIS 安装包、生成 .sig 与 latest.json 并上传到 Draft Release
      - name: Build and create draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: v__VERSION__
          releaseName: "SpecReader AI v__VERSION__"
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Attach standalone exe to draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $exe) { throw "No executable found in src-tauri/target/release" }
          $exeName = "SpecReader AI v${env:VERSION}.exe"
          Copy-Item -Path $exe.FullName -Destination $exeName -Force
          gh release upload "v${env:VERSION}" "$exeName"
